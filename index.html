<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Airtune</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0d0d0f;
      color: #e8e8ea;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .logo-name {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .logo-tag {
      font-size: 12px;
      color: #71717a;
      margin-top: 2px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #a1a1aa;
      margin-bottom: 8px;
      letter-spacing: 0.3px;
    }

    .input-row {
      display: flex;
      gap: 8px;
    }

    input[type="url"] {
      flex: 1;
      background: #09090b;
      border: 1px solid #27272a;
      border-radius: 8px;
      padding: 10px 14px;
      color: #e8e8ea;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="url"]:focus {
      border-color: #7c3aed;
    }

    input[type="url"]::placeholder {
      color: #3f3f46;
    }

    button {
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
      white-space: nowrap;
    }

    button:hover { opacity: 0.88; }
    button:disabled { opacity: 0.45; cursor: not-allowed; }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .result {
      margin-top: 28px;
      display: none;
    }

    .result.visible { display: block; }

    .result-box {
      background: #09090b;
      border: 1px solid #27272a;
      border-radius: 10px;
      padding: 20px;
    }

    .result-box.error {
      border-color: #7f1d1d;
      background: #1c0a0a;
    }

    .track-title {
      font-size: 20px;
      font-weight: 700;
      color: #a78bfa;
      margin-bottom: 8px;
    }

    .track-meta {
      font-size: 13px;
      color: #71717a;
      line-height: 1.8;
    }

    .track-meta span {
      color: #a1a1aa;
    }

    .confidence-bar {
      margin-top: 14px;
      background: #27272a;
      border-radius: 99px;
      height: 4px;
      overflow: hidden;
    }

    .confidence-fill {
      height: 100%;
      background: linear-gradient(90deg, #7c3aed, #2563eb);
      border-radius: 99px;
      transition: width 0.5s ease;
    }

    .raw-json {
      margin-top: 12px;
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 12px;
      color: #52525b;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .footer {
      margin-top: 20px;
      font-size: 12px;
      color: #3f3f46;
      text-align: center;
    }

    .footer a { color: #52525b; text-decoration: none; }
    .footer a:hover { color: #71717a; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">♫</div>
      <div>
        <div class="logo-name">Airtune</div>
        <div class="logo-tag">Radio song recognition</div>
      </div>
    </div>

    <label for="streamUrl">Stream URL</label>
    <div class="input-row">
      <input
        type="url"
        id="streamUrl"
        placeholder="https://stream.example.com/radio"
        autocomplete="off"
        spellcheck="false"
      />
      <button id="recognizeBtn" onclick="recognize()">Recognize</button>
    </div>

    <div class="result" id="result">
      <div class="result-box" id="resultBox">
        <div class="track-title" id="trackTitle"></div>
        <div class="track-meta" id="trackMeta"></div>
        <div class="confidence-bar" id="confBar" style="display:none">
          <div class="confidence-fill" id="confFill"></div>
        </div>
        <div class="raw-json" id="rawJson"></div>
      </div>
    </div>

    <div class="footer">
      Powered by <a href="https://airtune.ai" target="_blank">airtune.ai</a>
    </div>
  </div>

  <script>
    async function recognize() {
      const url = document.getElementById('streamUrl').value.trim();
      if (!url) return;

      const btn = document.getElementById('recognizeBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Identifying…';

      const result = document.getElementById('result');
      const box = document.getElementById('resultBox');
      result.classList.remove('visible');
      box.classList.remove('error');

      try {
        const resp = await fetch('/recognize', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url }),
        });

        const data = await resp.json();

        if (!resp.ok) {
          box.classList.add('error');
          document.getElementById('trackTitle').textContent = '✗ Error';
          document.getElementById('trackMeta').textContent = data.error || data.message || JSON.stringify(data);
          document.getElementById('confBar').style.display = 'none';
          document.getElementById('rawJson').textContent = '';
        } else {
          renderResult(data);
        }
      } catch (err) {
        box.classList.add('error');
        document.getElementById('trackTitle').textContent = '✗ Connection error';
        document.getElementById('trackMeta').textContent = err.message;
        document.getElementById('confBar').style.display = 'none';
        document.getElementById('rawJson').textContent = '';
      }

      result.classList.add('visible');
      btn.disabled = false;
      btn.textContent = 'Recognize';
    }

    function renderResult(data) {
      const title = data.title || data.song || data.track;
      const artist = data.artist;
      const album = data.album;
      const confidence = data.confidence ?? data.score;

      if (title) {
        document.getElementById('trackTitle').textContent = '♫  ' + title;
      } else {
        document.getElementById('trackTitle').textContent = 'No song identified';
      }

      let meta = '';
      if (artist) meta += `Artist  <span>${artist}</span>\n`;
      if (album)  meta += `Album   <span>${album}</span>\n`;
      document.getElementById('trackMeta').innerHTML = meta.trim().replace(/\n/g, '<br>');

      if (confidence != null) {
        const pct = confidence <= 1 ? Math.round(confidence * 100) : Math.round(confidence);
        document.getElementById('confBar').style.display = 'block';
        document.getElementById('confFill').style.width = pct + '%';
        document.getElementById('trackMeta').innerHTML +=
          (meta ? '<br>' : '') + `Match   <span>${pct}%</span>`;
      } else {
        document.getElementById('confBar').style.display = 'none';
      }

      if (!title && !artist) {
        document.getElementById('rawJson').textContent = JSON.stringify(data, null, 2);
      } else {
        document.getElementById('rawJson').textContent = '';
      }
    }

    document.getElementById('streamUrl').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') recognize();
    });
  </script>
</body>
</html>
